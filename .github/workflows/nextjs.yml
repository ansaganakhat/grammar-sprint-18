name: Deploy Grammar Sprint 18

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: grammar-sprint-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure public npm registry
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set audit false
          npm config set fund false
          npm config get registry

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci --prefer-online --no-audit --no-fund

      - name: Build Next.js static site
        env:
          GITHUB_ACTIONS: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run build

      - name: Add nojekyll marker
        run: touch out/.nojekyll

      - name: Verify exported site
        run: |
          test -f out/index.html
          echo "Static export is ready"
          find out -maxdepth 2 -type f | head -40

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
